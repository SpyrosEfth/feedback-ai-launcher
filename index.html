<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback AI Tool – Launcher</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f4f5f7;
      color: #172b4d;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 40px 48px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 440px;
    }
    h2 { font-size: 20px; margin: 0 0 8px; }
    p  { font-size: 14px; color: #5e6c84; margin: 0 0 8px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e3e8ee;
      border-top-color: #0052cc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #c0392b; font-size: 13px; margin-top: 8px; }
    a.btn {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 20px;
      background: #0052cc;
      color: white;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
    }
    a.btn:hover { background: #0747a6; }
      .muted { color: #5e6c84; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2>Feedback AI Tool</h2>
    <p id="msg">Opening the application…</p>
    <div id="fallback" style="display:none">
      <p class="error">
        App did not open automatically.<br/>
        Make sure the Feedback AI Tool is installed and has been run at least once.
      </p>
      <a class="btn" id="btn" href="#">Try Again</a>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var module = params.get('module') || 'home';
      var key    = params.get('key')    || '';
      var fallbackTimer = null;
      var closeAttempted = false;

      var deepLink;
      if (module === 'pfa') {
        deepLink = 'virmed-rca://open?module=pfa&jsmTicketKey=' + encodeURIComponent(key);
      } else if (module === 'rca') {
        deepLink = 'virmed-rca://open?module=rca&jiraIssueKey=' + encodeURIComponent(key);
      } else {
        deepLink = 'virmed-rca://open?module=home';
      }

      document.getElementById('btn').href = deepLink;

      function showFallback() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent = 'If the app did not open, use the button below.';
        document.getElementById('fallback').style.display = 'block';
      }

      function tryCloseLauncher() {
        if (closeAttempted) return;
        closeAttempted = true;
        if (fallbackTimer) {
          clearTimeout(fallbackTimer);
        }

        // Best effort only. Browsers typically allow close only for script-opened
        // windows, so blank the page as a fallback when close is blocked.
        window.close();
        setTimeout(function () {
          if (!window.closed) {
            document.body.innerHTML = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f4f5f7;color:#5e6c84;">Application opened. You can close this tab.</div>';
          }
        }, 150);
      }

      window.addEventListener('pagehide', tryCloseLauncher);
      window.addEventListener('blur', function () {
        setTimeout(function () {
          if (!document.hasFocus()) {
            tryCloseLauncher();
          }
        }, 300);
      });
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') {
          tryCloseLauncher();
        }
      });

      window.location.href = deepLink;

      fallbackTimer = setTimeout(showFallback, 3000);
    })();
  </script>
</body>
</html>
