<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Feedback Report Tool…</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f4f5f7;
            color: #172b4d;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 40px 48px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
            text-align: center;
            max-width: 440px;
        }

        h2 {
            font-size: 20px;
            margin: 0 0 8px;
        }

        p {
            font-size: 14px;
            color: #5e6c84;
            margin: 0 0 8px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e3e8ee;
            border-top-color: #0052cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Feedback Report Tool</h2>
        <p id="status">Opening the application…</p>
        <button id="close-btn" type="button" style="display: none; margin-top: 12px; padding: 8px 14px; border-radius: 6px; border: 1px solid #c1c7d0; background: #ffffff; color: #172b4d; cursor: pointer;">Close tab</button>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var module = params.get('module') || 'home';
            var key = params.get('key') || '';
            var spinner = document.querySelector('.spinner');
            var status = document.getElementById('status');
            var closeBtn = document.getElementById('close-btn');

            var deepLink;
            if (module === 'pfa') {
                deepLink = 'virmed-rca://open?module=pfa&jsmTicketKey=' + encodeURIComponent(key);
            } else if (module === 'rca') {
                deepLink = 'virmed-rca://open?module=rca&jiraIssueKey=' + encodeURIComponent(key);
            } else {
                deepLink = 'virmed-rca://open?module=home';
            }

            var closeStartedAt = Date.now();
            var closeAttemptTimer = null;
            var maxAttemptWindowMs = 3500;
            var attemptIntervalMs = 250;

            function showFallback() {
                if (spinner) {
                    spinner.style.display = 'none';
                }
                if (status) {
                    status.textContent = 'Application opened. You can close this tab.';
                }
                if (closeBtn) {
                    closeBtn.style.display = 'inline-block';
                }
            }

            function tryCloseOnce() {
                try {
                    window.close();
                } catch (e) {
                    // Ignore and continue to fallback if closing remains blocked.
                }
            }

            function attemptClose(reason) {
                if (window.closed) {
                    return;
                }

                tryCloseOnce();

                if (window.closed) {
                    return;
                }

                var elapsed = Date.now() - closeStartedAt;
                if (elapsed >= maxAttemptWindowMs) {
                    if (closeAttemptTimer) {
                        clearInterval(closeAttemptTimer);
                        closeAttemptTimer = null;
                    }
                    showFallback();
                }
            }

            function startCloseRetries() {
                if (closeAttemptTimer) {
                    return;
                }
                closeAttemptTimer = setInterval(function () {
                    attemptClose('retry');
                }, attemptIntervalMs);
            }

            if (closeBtn) {
                closeBtn.addEventListener('click', function () {
                    tryCloseOnce();
                    setTimeout(function () {
                        if (!window.closed) {
                            showFallback();
                            if (status) {
                                status.textContent = 'Chrome blocked automatic closing. Press Ctrl+W to close this tab.';
                            }
                        }
                    }, 150);
                });
            }

            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'hidden') {
                    attemptClose('visibilitychange');
                }
            });

            window.addEventListener('blur', function () {
                attemptClose('blur');
            });

            window.addEventListener('pagehide', function () {
                attemptClose('pagehide');
            });

            // Trigger the deep link to open the app, then attempt closure and retries.
            window.location.href = deepLink;

            setTimeout(function () {
                attemptClose('post-launch');
                startCloseRetries();
            }, 150);

            setTimeout(function () {
                if (!window.closed) {
                    if (closeAttemptTimer) {
                        clearInterval(closeAttemptTimer);
                        closeAttemptTimer = null;
                    }
                    showFallback();
                }
            }, maxAttemptWindowMs + 100);
        })();
    </script>
</body>

</html>
