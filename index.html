<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Feedback Report Tool…</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f4f5f7;
            color: #172b4d;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 40px 48px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
            text-align: center;
            max-width: 440px;
        }

        h2 {
            font-size: 20px;
            margin: 0 0 8px;
        }

        p {
            font-size: 14px;
            color: #5e6c84;
            margin: 0 0 8px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e3e8ee;
            border-top-color: #0052cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Feedback Report Tool</h2>
        <p>Opening the application…</p>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var module = params.get('module') || 'home';
            var key = params.get('key') || '';

            var deepLink;
            if (module === 'pfa') {
                deepLink = 'virmed-rca://open?module=pfa&jsmTicketKey=' + encodeURIComponent(key);
            } else if (module === 'rca') {
                deepLink = 'virmed-rca://open?module=rca&jiraIssueKey=' + encodeURIComponent(key);
            } else {
                deepLink = 'virmed-rca://open?module=home';
            }

            // Close when the app takes focus (user granted permission and app opened)
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'hidden') {
                    window.close();
                }
            });

            // Also close if user navigates away
            window.addEventListener('pagehide', function () {
                window.close();
            });

            // Trigger the deep link to open the app
            window.location.href = deepLink;
        })();
    </script>
</body>

</html>
